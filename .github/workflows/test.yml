name: test

on:
  push:
  workflow_dispatch:

jobs:
  tinytapeout_rtl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Run RTL test
        run: |
          cd test
          make clean
          make
          ! grep failure results.xml

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2.4
        with:
          paths: test/results.xml

      - name: Upload test evidence
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: tinytapeout-rtl-test-results
          path: |
            test/results.xml
            test/sim_build/

  candidate_regression:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Test analysis utilities
        run: pytest -q analysis_tests --junitxml=analysis-tests.xml

      - name: Generate deterministic test corpus
        run: |
          python gen_vectors.py --seed 20260717
          sha256sum vectors.txt

      - name: Run candidate functional regression
        shell: bash
        run: |
          set -o pipefail
          make sim | tee unmasked_run.log
          make check_masking | tee compatibility_masked_run.log
          make sim_dom32 | tee dom32_run.log

      - name: Upload candidate regression evidence
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: candidate-functional-regression
          path: |
            vectors.txt
            unmasked_run.log
            compatibility_masked_run.log
            masked_sim.log
            dom32_run.log
            dom32_iverilog.log
            analysis-tests.xml
